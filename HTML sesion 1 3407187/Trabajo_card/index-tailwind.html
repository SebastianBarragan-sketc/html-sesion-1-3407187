<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta-Tailwind</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[rgb(200,227,184)] p-10">

    <div class="block w-[600px] h-[300px]
                border-t-[10px] border-t-[rgb(177,145,12)] [border-top-style:double]
                border-r-[9px] border-r-[rgb(112,47,157)] [border-right-style:dashed]
                border-l-[11px] border-l-[rgb(31,78,122)] [border-left-style:solid]
                border-b-[3px] border-b-[rgb(27,161,196)] [border-bottom-style:solid]">
    </div>
</body>
</html>
