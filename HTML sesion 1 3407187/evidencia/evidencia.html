<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }

        body{
            background-color: #adadad;
        }

        .card{
            display: block;
            width: 300px;
            height: 400px;
            background-color: #fff;
            margin: 20px auto;
        }

        .card__company{
            background-color: #404042;
            display: block;
            width: 100%;
            height: 100px;
        }

        .card__flag{
            background-color: #9b9b9b;
            display: block;
            width: auto;
            height: 50px;
        }

        .card__image{
            display: block;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: rgb(255, 255, 255) solid 5px;
            margin-top: -90px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card__company"></div>
        <diV class="card__flag"></diV>
        <img class="card__image" src="" alt="">
    </div>
</body>
</html>
