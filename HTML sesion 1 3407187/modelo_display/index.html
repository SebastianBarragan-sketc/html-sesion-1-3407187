<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Document</title>
    <style>
        .titulo{
            color: darkred;
            font-size: 15px;
            background-color: aqua;
            letter-spacing: 3px;
        }
        .menu{ 
            display: inline;
            background-color: cadetblue;
            color: beige;
            width: 500px;
            height: 100px;
        }
        .menu_block{
            display: block;
            background-color: cadetblue;
            color: beige;
            width: 500px;
            height: 100px;

        }
    </style>
</head>
<body>
    <h1 class="titulo">Elementos inline</h1>
    <div class="menu">Productos</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contacto</div>

    <hr>
    <h1 class="titulo">Elementos block</h1>
    <div class="menu_block">Productos</div>
    <div class="menu_block">Servicios</div>
    <div class="menu_block">Contacto</div>
</body>
</html>
